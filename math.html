<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Test</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<style>
		/* Hide the default features for number types in chrome and firefox (the increment arrows) */
		/* Chrome, Safari, Edge, Opera */
		input::-webkit-outer-spin-button,
		input::-webkit-inner-spin-button {
			-webkit-appearance: none;
			margin: 0;
		}

		/* Firefox */
		input[type=number] {
			appearance: textfield;
			-moz-appearance: textfield;
		}
	</style>
</head>
<body>
    <!-- Header -->
    <header class="bg-secondary text-white py-5">
        <div class="container">
            <h1 class="text-center">Math Test</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="py-5">
        <div class="container">
            <section class="text-center">
				<div class="mx-auto col-lg-2 col-sm-4 col-8 p-2 border rounded" style="min-height: 240px;">
					<div class="row g-0">
						<div class="col-4">
						</div>
						<div class="col-8">
							<div id="divNum1" style="min-height: 24px;"></div>
						</div>
					</div>
					<div class="row g-0">
						<div class="col-4 text-end">
							<span>+</span>
							<hr/>
						</div>
						<div class="col-8">
							<div id="divNum2" style="min-height: 24px;"></div>
							<hr/>
							<form id="frmMath">
								<input id="txtAnswer" name="answer" type="number" value="" style="width: 80px; text-align: center; caret-color: transparent;" />
							</form>
							<br/>
							<br/>
							<div id="divFeedback" style="font-weight: bold;"></div>
						</div>
					</div>
				</div>
            </section>
        </div>
    </main>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	
	<script>
		var correctAnswer = 0;
	
		$(function() {
			generateNewNumbers();
		});
		
		function generateNewNumbers() {
			$('#divFeedback').html('');
		
			var num1 = Math.floor(Math.random() * 9) + 1;
			var num2 = Math.floor(Math.random() * 9) + 1;
			
			correctAnswer = num1 + num2;
			
			$('#divNum1').html(num1);
			$('#divNum2').html(num2);
			
			$('#txtAnswer').val('');
			$('#txtAnswer').focus();
		}
		
		$('#frmMath').on('submit', function(e) {
			// prevent the default HTTP form submission
			e.preventDefault();
			
			// unfocus the answer box
			$('#txtAnswer').blur();

			// capture form data			
			var submittedAnswer = parseInt($('#txtAnswer').val());
			
			if(correctAnswer == submittedAnswer) {
				$('#divFeedback').removeClass('text-danger');
				$('#divFeedback').addClass('text-success');
				$('#divFeedback').html('Correct!');
				setTimeout(generateNewNumbers, 1750);
			}
			else {
				$('#divFeedback').removeClass('text-success');
				$('#divFeedback').addClass('text-danger');
				$('#divFeedback').html('Wrong!');
				setTimeout(() => {
					$('#txtAnswer').val('');
					$('#txtAnswer').focus();
					$('#divFeedback').html('');
				}, 750);
			}
		});
	</script>
</body>
</html>
